name = "orientico"
pages_build_output_dir = "public"
compatibility_date = "2024-01-01"

[vars]
SUPABASE_URL = "https://eztpyonfjdtkaopotswz.supabase.co"
# SUPABASE_SERVICE_KEY → wrangler pages secret put SUPABASE_SERVICE_KEY  (usa la service_role key dal dashboard Supabase)

# n8n: webhook iniziale "nuova richiesta" (genera 4 anteprime + manda email)
N8N_WEBHOOK_URL          = "https://n8n.orientico.com/webhook/orientico-nuova-richiesta"
# n8n: webhook quando cliente clicca "Scegli questo stile" (per analytics/notifiche)
N8N_WEBHOOK_SCELTA       = "https://n8n.orientico.com/webhook/orientico-scelta"
# n8n: webhook quando cliente chiede modifiche (Cloudflare lo chiama in fire-and-forget)
N8N_WEBHOOK_MODIFICA     = "https://n8n.orientico.com/webhook/orientico-modifica"

# RESEND_API_KEY → wrangler pages secret put RESEND_API_KEY
RESEND_FROM              = "Orientico <onboarding@orientico.com>"

# Qwen: in locale via Ollama, esposto via Cloudflare Tunnel
QWEN_API_KEY             = "ollama"
QWEN_BASE_URL            = "https://qwen.orientico.com/v1"
QWEN_MODEL               = "qwen2.5:7b"

# ADMIN_SECRET → wrangler pages secret put ADMIN_SECRET
