<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caricamento...</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafaf9; color: #1c1917; }

  .hero {
    min-height: 240px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 28px 20px;
    color: white;
    position: relative;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.55);
  }
  .hero-content { position: relative; z-index: 1; }
  .category-tag {
    display: inline-block;
    background: rgba(255,255,255,.2);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.3);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 10px;
    width: fit-content;
  }
  .hero h1 { font-size: 30px; font-weight: 800; letter-spacing: -.5px; line-height: 1.1; }
  .hero .address { margin-top: 8px; font-size: 14px; opacity: .85; }

  .stars-bar {
    background: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #e7e5e4;
    font-size: 14px;
  }
  .stars { color: #f59e0b; font-size: 16px; }
  .open-badge {
    margin-left: auto;
    background: #dcfce7;
    color: #166534;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .content { max-width: 520px; margin: 0 auto; padding: 0 20px 90px; }

  .avviso-banner {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 20px;
    font-size: 14px;
    color: #991b1b;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .info-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    margin-top: 20px;
    border: 1px solid #e7e5e4;
  }
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border-bottom: 1px solid #f5f5f4;
  }
  .info-row:last-child { border-bottom: none; }
  .info-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .info-label { font-size: 11px; color: #a8a29e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .info-value { font-size: 15px; font-weight: 500; }
  .hours-table { width: 100%; border-collapse: collapse; }
  .hours-table td { font-size: 14px; padding: 3px 0; color: #57534e; }
  .hours-table td:first-child { font-weight: 600; color: #1c1917; width: 48%; }

  .promo-banner {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 1px solid #fcd34d;
    border-radius: 12px;
    padding: 16px 18px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .promo-banner .emoji { font-size: 24px; }
  .promo-banner strong { font-size: 15px; color: #92400e; display: block; }
  .promo-banner span { font-size: 13px; color: #b45309; }

  .menu-section { margin-top: 28px; }
  .menu-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
  .menu-cat-title {
    font-size: 12px; font-weight: 700; color: #a8a29e;
    text-transform: uppercase; letter-spacing: 1px;
    margin: 16px 0 8px; padding-bottom: 6px;
    border-bottom: 1px solid #e7e5e4;
  }
  .menu-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 1px dashed #f5f5f4;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item-name { font-size: 15px; }
  .menu-item-desc { font-size: 13px; color: #78716c; }
  .menu-item-price { font-size: 15px; font-weight: 700; flex-shrink: 0; margin-left: 12px; }

  .cta-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid #e7e5e4;
    padding: 12px 20px;
    display: flex;
    gap: 10px;
  }
  .btn-call {
    flex: 1;
    color: white;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-maps {
    background: #f5f5f4;
    color: #1c1917;
    padding: 14px 18px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .weblocal-credit { text-align: center; padding: 20px; font-size: 12px; color: #a8a29e; }
  .weblocal-credit a { color: #38bdf8; text-decoration: none; }

  /* skeleton loader */
  .skeleton { background: #e7e5e4; border-radius: 6px; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>

<div id="app">
  <!-- Contenuto generato da JavaScript leggendo dati-cliente.json -->
  <div style="padding:40px 20px;text-align:center;color:#a8a29e;">
    <div class="skeleton" style="height:240px;border-radius:0;"></div>
  </div>
</div>

<script>
async function caricaSito() {
  // Legge chatId dall'URL: /sito/8477790494 oppure ?id=8477790494
  const chatId = location.pathname.split('/').pop() || new URLSearchParams(location.search).get('id');
  const endpoint = chatId && chatId !== 'sito.html'
    ? `/cliente/${chatId}`
    : './dati-cliente.json';
  const res = await fetch(endpoint);
  const d = await res.json();

  document.title = d.nome;

  // Calcola se aperto ora (semplificato: lun-ven 12-23)
  const ora = new Date().getHours();
  const giorno = new Date().getDay(); // 0=dom,6=sab
  const aperto = giorno >= 1 && giorno <= 5 && (ora >= 12 && ora <= 23);

  // Stelle
  const stellePiene = Math.floor(d.stelle);
  const stelleStr = '★'.repeat(stellePiene) + (d.stelle % 1 >= 0.5 ? '½' : '') + '☆'.repeat(5 - Math.ceil(d.stelle));

  // Orari
  const orariRighe = d.orari.map(o =>
    `<tr><td>${o.giorno}</td><td>${o.ore}</td></tr>`
  ).join('');

  // Avviso
  const avvisoBanner = d.avviso
    ? `<div class="avviso-banner">⚠️ <span>${d.avviso}</span></div>`
    : '';

  // Promozione
  const promoBanner = d.promozione?.attiva
    ? `<div class="promo-banner">
        <div class="emoji">🎉</div>
        <div>
          <strong>${d.promozione.testo}</strong>
          <span>${d.promozione.dettaglio}</span>
        </div>
       </div>`
    : '';

  // Info extra
  const infoExtra = d.info_extra.map(i =>
    `<div class="info-row">
      <div class="info-icon">${i.icona}</div>
      <div><div class="info-label">${i.label}</div><div class="info-value">${i.valore}</div></div>
     </div>`
  ).join('');

  // Menu
  const menuHTML = d.menu ? `
    <div class="menu-section">
      <h2>Il nostro menù</h2>
      ${d.menu.map(cat => `
        <div class="menu-cat-title">${cat.categoria}</div>
        ${cat.piatti.map(p => `
          <div class="menu-item">
            <div>
              <div class="menu-item-name">${p.nome}</div>
              ${p.desc ? `<div class="menu-item-desc">${p.desc}</div>` : ''}
            </div>
            <div class="menu-item-price" style="color:${d.colore_primario}">€ ${p.prezzo}</div>
          </div>
        `).join('')}
      `).join('')}
    </div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="hero" style="background: url('') center/cover; background-color:${d.colore_header};">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="category-tag">${d.emoji_categoria} ${d.categoria}</div>
        <h1>${d.nome}</h1>
        <div class="address">📍 ${d.indirizzo}</div>
      </div>
    </div>

    <div class="stars-bar">
      <span class="stars">${stelleStr.replace('½','★')}</span>
      <strong>${d.stelle}</strong>
      <span style="color:#78716c">· ${d.num_recensioni} recensioni Google</span>
      <span class="${aperto ? 'open-badge' : ''}" style="${!aperto ? 'margin-left:auto;background:#fee2e2;color:#991b1b;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;' : ''}">
        ${aperto ? '● Aperto ora' : '● Chiuso'}
      </span>
    </div>

    <div class="content">
      ${avvisoBanner}

      <div class="info-card">
        <div class="info-row">
          <div class="info-icon">🕐</div>
          <div>
            <div class="info-label">Orari</div>
            <table class="hours-table">${orariRighe}</table>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">📞</div>
          <div>
            <div class="info-label">Telefono</div>
            <div class="info-value">${d.telefono}</div>
          </div>
        </div>
        ${infoExtra}
      </div>

      ${promoBanner}
      ${menuHTML}

      <div class="weblocal-credit">
        Sito creato con <a href="#">WebLocal</a>
      </div>
    </div>

    <div class="cta-bar">
      <a href="tel:${d.telefono.replace(/\s/g,'')}" class="btn-call" style="background:${d.colore_primario}">
        📞 Chiama ora
      </a>
      <a href="https://maps.google.com/?q=${encodeURIComponent(d.indirizzo)}" class="btn-maps" target="_blank">
        🗺️ Mappa
      </a>
    </div>
  `;
}

caricaSito().catch(e => {
  document.getElementById('app').innerHTML = '<p style="padding:40px;text-align:center;color:#a8a29e;">Errore nel caricamento dei dati.</p>';
});
</script>

</body>
</html>
